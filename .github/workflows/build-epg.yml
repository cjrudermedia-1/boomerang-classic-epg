name: Build and Publish Boomerang Classic EPG

on:
  schedule:
    - cron: "10 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install scraper tools
        run: python -m pip install requests beautifulsoup4

      - name: Build EPG
        run: python build_epg.py

      - name: Prepare public site files
        run: |
          mkdir public_site
          cp epg.xml public_site/epg.xml
          cp playlist.m3u public_site/playlist.m3u
          cat > public_site/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Boomerang Classic EPG</title>
            </head>
            <body>
              <h1>Boomerang Classic EPG</h1>
              <p><a href="epg.xml">EPG XMLTV file</a></p>
              <p><a href="playlist.m3u">Playlist M3U file</a></p>
            </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages files
        uses: actions/upload-pages-artifact@v4
        with:
          path: public_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
