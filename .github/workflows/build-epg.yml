name: Build Boomerang Classic EPG

on:
  schedule:
    - cron: "10 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper tools
        run: python -m pip install requests beautifulsoup4

      - name: Build EPG
        run: python build_epg.py

      - name: Save updated EPG
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add epg.xml
          git diff --cached --quiet && echo "No EPG changes" || git commit -m "Update EPG"
          git push
